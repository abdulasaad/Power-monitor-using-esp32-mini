<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 850">
  <style>
    text { font-family: Arial, sans-serif; font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; }
    .label { font-size: 11px; }
    .component { font-size: 10px; font-weight: bold; }
    .pin-label { font-size: 9px; }
  </style>

  <!-- Background -->
  <rect width="950" height="850" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="475" y="30" text-anchor="middle" class="title">Power Monitoring System - ESP32-C3 Super Mini</text>
  <text x="475" y="50" text-anchor="middle" class="label">2x SCT-013-060 (Current) + ZMPT101B (Voltage)</text>

  <!-- ============ CHANNEL 1 - CT1 ============ -->
  <text x="90" y="85" text-anchor="middle" font-weight="bold" fill="#8e44ad">CT1 - CURRENT CH1</text>

  <!-- 3.5mm Jack 1 -->
  <rect x="50" y="100" width="80" height="80" rx="10" fill="#333" stroke="#000" stroke-width="2"/>
  <text x="90" y="200" text-anchor="middle" fill="#666" class="label">SCT-013</text>
  <circle cx="90" cy="135" r="12" fill="#666" stroke="#444" stroke-width="2"/>
  <circle cx="90" cy="135" r="6" fill="#222"/>
  <!-- Jack pins -->
  <rect x="130" y="115" width="20" height="5" fill="#cd7f32"/>
  <text x="158" y="120" class="label">TIP</text>
  <rect x="130" y="150" width="20" height="5" fill="#cd7f32"/>
  <text x="158" y="155" class="label">GND</text>

  <!-- Wires from jack 1 -->
  <line x1="150" y1="117" x2="190" y2="117" stroke="#e74c3c" stroke-width="2"/>
  <line x1="150" y1="152" x2="190" y2="152" stroke="#000" stroke-width="2"/>

  <!-- 33 Ohm Resistor 1 -->
  <rect x="190" y="107" width="40" height="20" fill="#f4e4ba" stroke="#000" stroke-width="1"/>
  <text x="210" y="121" text-anchor="middle" class="component">33Ω</text>

  <!-- Wire from 33ohm to Point A1 -->
  <line x1="230" y1="117" x2="320" y2="117" stroke="#e74c3c" stroke-width="2"/>

  <!-- POINT A1 - Junction -->
  <circle cx="320" cy="117" r="5" fill="#3498db" stroke="#2980b9" stroke-width="2"/>

  <!-- Voltage Divider 1 - Top 100k -->
  <line x1="320" y1="117" x2="320" y2="90" stroke="#3498db" stroke-width="2"/>
  <rect x="308" y="65" width="24" height="25" fill="#f4e4ba" stroke="#000" stroke-width="1"/>
  <text x="320" y="82" text-anchor="middle" class="component">100k</text>
  <line x1="320" y1="65" x2="320" y2="55" stroke="#e74c3c" stroke-width="2"/>

  <!-- Voltage Divider 1 - Bottom 100k -->
  <line x1="320" y1="117" x2="320" y2="135" stroke="#3498db" stroke-width="2"/>
  <rect x="308" y="135" width="24" height="25" fill="#f4e4ba" stroke="#000" stroke-width="1"/>
  <text x="320" y="152" text-anchor="middle" class="component">100k</text>
  <line x1="320" y1="160" x2="320" y2="210" stroke="#000" stroke-width="2"/>

  <!-- 10uF Capacitor 1 -->
  <line x1="320" y1="117" x2="370" y2="117" stroke="#3498db" stroke-width="2"/>
  <line x1="370" y1="117" x2="370" y2="135" stroke="#3498db" stroke-width="2"/>
  <rect x="362" y="135" width="16" height="25" fill="#1a5276" stroke="#000" stroke-width="1"/>
  <text x="370" y="152" text-anchor="middle" fill="white" class="component">10µF</text>
  <text x="380" y="140" class="label">+</text>
  <line x1="370" y1="160" x2="370" y2="210" stroke="#000" stroke-width="2"/>

  <!-- 100nF Capacitor 1 -->
  <line x1="370" y1="117" x2="420" y2="117" stroke="#3498db" stroke-width="2"/>
  <line x1="420" y1="117" x2="420" y2="135" stroke="#3498db" stroke-width="2"/>
  <rect x="412" y="135" width="16" height="20" fill="#f39c12" stroke="#000" stroke-width="1"/>
  <text x="420" y="149" text-anchor="middle" class="component">100n</text>
  <line x1="420" y1="155" x2="420" y2="210" stroke="#000" stroke-width="2"/>

  <!-- Wire to GPIO2 -->
  <line x1="420" y1="117" x2="520" y2="117" stroke="#27ae60" stroke-width="3"/>
  <text x="470" y="110" text-anchor="middle" fill="#27ae60" class="label">→ GPIO2</text>

  <!-- GND line from CT1 -->
  <line x1="190" y1="152" x2="190" y2="210" stroke="#000" stroke-width="2"/>

  <!-- ============ CHANNEL 2 - CT2 ============ -->
  <text x="90" y="245" text-anchor="middle" font-weight="bold" fill="#e67e22">CT2 - CURRENT CH2</text>

  <!-- 3.5mm Jack 2 -->
  <rect x="50" y="260" width="80" height="80" rx="10" fill="#333" stroke="#000" stroke-width="2"/>
  <text x="90" y="360" text-anchor="middle" fill="#666" class="label">SCT-013</text>
  <circle cx="90" cy="295" r="12" fill="#666" stroke="#444" stroke-width="2"/>
  <circle cx="90" cy="295" r="6" fill="#222"/>
  <!-- Jack pins -->
  <rect x="130" y="275" width="20" height="5" fill="#cd7f32"/>
  <text x="158" y="280" class="label">TIP</text>
  <rect x="130" y="310" width="20" height="5" fill="#cd7f32"/>
  <text x="158" y="315" class="label">GND</text>

  <!-- Wires from jack 2 -->
  <line x1="150" y1="277" x2="190" y2="277" stroke="#e74c3c" stroke-width="2"/>
  <line x1="150" y1="312" x2="190" y2="312" stroke="#000" stroke-width="2"/>

  <!-- 33 Ohm Resistor 2 -->
  <rect x="190" y="267" width="40" height="20" fill="#f4e4ba" stroke="#000" stroke-width="1"/>
  <text x="210" y="281" text-anchor="middle" class="component">33Ω</text>

  <!-- Wire from 33ohm to Point A2 -->
  <line x1="230" y1="277" x2="320" y2="277" stroke="#e74c3c" stroke-width="2"/>

  <!-- POINT A2 - Junction -->
  <circle cx="320" cy="277" r="5" fill="#3498db" stroke="#2980b9" stroke-width="2"/>

  <!-- Voltage Divider 2 - Top 100k -->
  <line x1="320" y1="277" x2="320" y2="250" stroke="#3498db" stroke-width="2"/>
  <rect x="308" y="225" width="24" height="25" fill="#f4e4ba" stroke="#000" stroke-width="1"/>
  <text x="320" y="242" text-anchor="middle" class="component">100k</text>
  <line x1="320" y1="225" x2="320" y2="210" stroke="#e74c3c" stroke-width="2"/>

  <!-- Voltage Divider 2 - Bottom 100k -->
  <line x1="320" y1="277" x2="320" y2="295" stroke="#3498db" stroke-width="2"/>
  <rect x="308" y="295" width="24" height="25" fill="#f4e4ba" stroke="#000" stroke-width="1"/>
  <text x="320" y="312" text-anchor="middle" class="component">100k</text>
  <line x1="320" y1="320" x2="320" y2="370" stroke="#000" stroke-width="2"/>

  <!-- 10uF Capacitor 2 -->
  <line x1="320" y1="277" x2="370" y2="277" stroke="#3498db" stroke-width="2"/>
  <line x1="370" y1="277" x2="370" y2="295" stroke="#3498db" stroke-width="2"/>
  <rect x="362" y="295" width="16" height="25" fill="#1a5276" stroke="#000" stroke-width="1"/>
  <text x="370" y="312" text-anchor="middle" fill="white" class="component">10µF</text>
  <text x="380" y="300" class="label">+</text>
  <line x1="370" y1="320" x2="370" y2="370" stroke="#000" stroke-width="2"/>

  <!-- 100nF Capacitor 2 -->
  <line x1="370" y1="277" x2="420" y2="277" stroke="#3498db" stroke-width="2"/>
  <line x1="420" y1="277" x2="420" y2="295" stroke="#3498db" stroke-width="2"/>
  <rect x="412" y="295" width="16" height="20" fill="#f39c12" stroke="#000" stroke-width="1"/>
  <text x="420" y="309" text-anchor="middle" class="component">100n</text>
  <line x1="420" y1="315" x2="420" y2="370" stroke="#000" stroke-width="2"/>

  <!-- Wire to GPIO3 -->
  <line x1="420" y1="277" x2="520" y2="277" stroke="#27ae60" stroke-width="3"/>
  <text x="470" y="270" text-anchor="middle" fill="#27ae60" class="label">→ GPIO3</text>

  <!-- GND line from CT2 -->
  <line x1="190" y1="312" x2="190" y2="370" stroke="#000" stroke-width="2"/>

  <!-- ============ ZMPT101B VOLTAGE SENSOR ============ -->
  <text x="90" y="405" text-anchor="middle" font-weight="bold" fill="#16a085">ZMPT101B - VOLTAGE</text>

  <!-- ZMPT101B Module -->
  <rect x="50" y="420" width="120" height="100" rx="5" fill="#2980b9" stroke="#1a5276" stroke-width="2"/>
  <text x="110" y="445" text-anchor="middle" fill="white" font-weight="bold">ZMPT101B</text>
  <text x="110" y="460" text-anchor="middle" fill="#ecf0f1" class="label">AC Voltage</text>
  <text x="110" y="475" text-anchor="middle" fill="#ecf0f1" class="label">Sensor Module</text>

  <!-- AC Input terminals -->
  <rect x="55" y="485" width="15" height="25" fill="#333" stroke="#000"/>
  <text x="62" y="525" text-anchor="middle" fill="#666" class="label">AC</text>
  <rect x="80" y="485" width="15" height="25" fill="#333" stroke="#000"/>
  <text x="88" y="525" text-anchor="middle" fill="#666" class="label">AC</text>

  <!-- Module pins on right side -->
  <rect x="170" y="435" width="25" height="8" fill="#cd7f32"/>
  <text x="205" y="442" class="label">VCC</text>

  <rect x="170" y="465" width="25" height="8" fill="#cd7f32"/>
  <text x="205" y="472" class="label">OUT</text>

  <rect x="170" y="495" width="25" height="8" fill="#cd7f32"/>
  <text x="205" y="502" class="label">GND</text>

  <!-- ZMPT101B Wiring -->
  <!-- VCC to 3.3V -->
  <line x1="195" y1="439" x2="280" y2="439" stroke="#e74c3c" stroke-width="2"/>
  <line x1="280" y1="439" x2="280" y2="210" stroke="#e74c3c" stroke-width="2"/>

  <!-- OUT to GPIO4 -->
  <line x1="195" y1="469" x2="520" y2="469" stroke="#27ae60" stroke-width="3"/>
  <text x="400" y="462" text-anchor="middle" fill="#27ae60" class="label">→ GPIO4</text>

  <!-- GND -->
  <line x1="195" y1="499" x2="250" y2="499" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="499" x2="250" y2="540" stroke="#000" stroke-width="2"/>

  <!-- AC Input Note -->
  <text x="110" y="555" text-anchor="middle" fill="#c0392b" class="label">Connect to AC</text>
  <text x="110" y="570" text-anchor="middle" fill="#c0392b" class="label">mains via plug</text>

  <!-- 3.3V Bus -->
  <line x1="280" y1="210" x2="520" y2="210" stroke="#e74c3c" stroke-width="3"/>
  <line x1="320" y1="55" x2="320" y2="55" stroke="#e74c3c" stroke-width="2"/>
  <line x1="320" y1="55" x2="520" y2="55" stroke="#e74c3c" stroke-width="3"/>
  <line x1="520" y1="55" x2="520" y2="210" stroke="#e74c3c" stroke-width="3"/>
  <text x="400" y="202" class="label" fill="#c0392b">3.3V BUS</text>

  <!-- Common GND Bus -->
  <line x1="190" y1="370" x2="520" y2="370" stroke="#000" stroke-width="3"/>
  <line x1="190" y1="210" x2="190" y2="370" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="540" x2="520" y2="540" stroke="#000" stroke-width="3"/>
  <line x1="520" y1="370" x2="520" y2="540" stroke="#000" stroke-width="3"/>
  <text x="350" y="535" class="label">GND BUS</text>

  <!-- ============ ESP32-C3 Super Mini ============ -->
  <rect x="520" y="40" width="180" height="515" rx="8" fill="#1a252f" stroke="#000" stroke-width="2"/>

  <!-- Board label -->
  <text x="610" y="575" text-anchor="middle" fill="#1a252f" font-weight="bold">ESP32-C3 SUPER MINI</text>

  <!-- USB Port -->
  <rect x="575" y="45" width="70" height="18" rx="3" fill="#444" stroke="#222"/>
  <text x="610" y="58" text-anchor="middle" fill="#aaa" class="pin-label">USB-C</text>

  <!-- Pin labels inside ESP32 -->
  <text x="610" y="90" text-anchor="middle" fill="#666" class="pin-label">ESP32-C3</text>
  <text x="610" y="105" text-anchor="middle" fill="#666" class="pin-label">Super Mini</text>

  <!-- ESP32 Pins - Left side with connections -->
  <rect x="510" y="50" width="20" height="12" fill="#cd7f32"/>
  <text x="545" y="60" fill="#e74c3c" class="pin-label">3.3V</text>
  <line x1="520" y1="56" x2="530" y2="56" stroke="#e74c3c" stroke-width="2"/>

  <rect x="510" y="112" width="20" height="12" fill="#cd7f32"/>
  <text x="545" y="122" fill="#8e44ad" class="pin-label">GPIO2 ← CT1</text>
  <line x1="520" y1="118" x2="530" y2="118" stroke="#27ae60" stroke-width="2"/>

  <rect x="510" y="205" width="20" height="12" fill="#cd7f32"/>
  <text x="545" y="215" fill="#e74c3c" class="pin-label">3.3V (bus)</text>
  <line x1="520" y1="211" x2="530" y2="211" stroke="#e74c3c" stroke-width="2"/>

  <rect x="510" y="272" width="20" height="12" fill="#cd7f32"/>
  <text x="545" y="282" fill="#e67e22" class="pin-label">GPIO3 ← CT2</text>
  <line x1="520" y1="278" x2="530" y2="278" stroke="#27ae60" stroke-width="2"/>

  <rect x="510" y="365" width="20" height="12" fill="#cd7f32"/>
  <text x="545" y="375" fill="#ecf0f1" class="pin-label">GND (bus)</text>
  <line x1="520" y1="371" x2="530" y2="371" stroke="#000" stroke-width="2"/>

  <rect x="510" y="464" width="20" height="12" fill="#cd7f32"/>
  <text x="545" y="474" fill="#16a085" class="pin-label">GPIO4 ← ZMPT</text>
  <line x1="520" y1="470" x2="530" y2="470" stroke="#27ae60" stroke-width="2"/>

  <rect x="510" y="535" width="20" height="12" fill="#cd7f32"/>
  <text x="545" y="545" fill="#ecf0f1" class="pin-label">GND</text>
  <line x1="520" y1="541" x2="530" y2="541" stroke="#000" stroke-width="2"/>

  <!-- Other available pins note -->
  <text x="610" y="150" text-anchor="middle" fill="#555" class="pin-label">Available ADC pins:</text>
  <text x="610" y="165" text-anchor="middle" fill="#444" class="pin-label">GPIO0, GPIO1</text>
  <text x="610" y="180" text-anchor="middle" fill="#444" class="pin-label">(spare)</text>

  <text x="610" y="320" text-anchor="middle" fill="#555" class="pin-label">Digital pins:</text>
  <text x="610" y="335" text-anchor="middle" fill="#444" class="pin-label">GPIO5-10, 20, 21</text>

  <text x="610" y="420" text-anchor="middle" fill="#555" class="pin-label">I2C: GPIO8 (SDA)</text>
  <text x="610" y="435" text-anchor="middle" fill="#555" class="pin-label">GPIO9 (SCL)</text>

  <!-- ============ LEGEND AND SUMMARY ============ -->
  <rect x="50" y="600" width="850" height="230" fill="white" stroke="#ccc" stroke-width="1" rx="5"/>

  <text x="475" y="625" text-anchor="middle" font-weight="bold" font-size="14">CONNECTION SUMMARY</text>

  <!-- Wire color legend -->
  <text x="100" y="655" font-weight="bold" class="label">WIRE COLORS:</text>
  <line x1="200" y1="650" x2="250" y2="650" stroke="#e74c3c" stroke-width="4"/>
  <text x="260" y="655" class="label">3.3V Power</text>
  <line x1="370" y1="650" x2="420" y2="650" stroke="#000" stroke-width="4"/>
  <text x="430" y="655" class="label">Ground</text>
  <line x1="520" y1="650" x2="570" y2="650" stroke="#27ae60" stroke-width="4"/>
  <text x="580" y="655" class="label">Signal (ADC)</text>
  <line x1="680" y1="650" x2="730" y2="650" stroke="#3498db" stroke-width="4"/>
  <text x="740" y="655" class="label">Internal</text>

  <!-- Connection table header -->
  <text x="100" y="690" font-weight="bold" class="label">COMPONENT</text>
  <text x="280" y="690" font-weight="bold" class="label">PIN</text>
  <text x="400" y="690" font-weight="bold" class="label">CONNECTS TO</text>
  <text x="580" y="690" font-weight="bold" class="label">ESP32-C3 PIN</text>
  <line x1="70" y1="698" x2="880" y2="698" stroke="#ccc" stroke-width="1"/>

  <!-- CT1 connections -->
  <text x="100" y="715" fill="#8e44ad" class="label">CT1 (SCT-013)</text>
  <text x="280" y="715" class="label">TIP</text>
  <text x="400" y="715" class="label">33Ω → 100k divider → capacitors</text>
  <text x="580" y="715" fill="#27ae60" class="label">GPIO2 (ADC1_CH2)</text>

  <text x="280" y="732" class="label">SLEEVE</text>
  <text x="400" y="732" class="label">GND Bus</text>
  <text x="580" y="732" class="label">GND</text>

  <!-- CT2 connections -->
  <text x="100" y="755" fill="#e67e22" class="label">CT2 (SCT-013)</text>
  <text x="280" y="755" class="label">TIP</text>
  <text x="400" y="755" class="label">33Ω → 100k divider → capacitors</text>
  <text x="580" y="755" fill="#27ae60" class="label">GPIO3 (ADC1_CH3)</text>

  <text x="280" y="772" class="label">SLEEVE</text>
  <text x="400" y="772" class="label">GND Bus</text>
  <text x="580" y="772" class="label">GND</text>

  <!-- ZMPT101B connections -->
  <text x="100" y="795" fill="#16a085" class="label">ZMPT101B</text>
  <text x="280" y="795" class="label">VCC</text>
  <text x="400" y="795" class="label">3.3V Bus (direct)</text>
  <text x="580" y="795" fill="#e74c3c" class="label">3.3V</text>

  <text x="280" y="812" class="label">OUT</text>
  <text x="400" y="812" class="label">Direct connection</text>
  <text x="580" y="812" fill="#27ae60" class="label">GPIO4 (ADC1_CH4)</text>

  <text x="280" y="829" class="label">GND</text>
  <text x="400" y="829" class="label">GND Bus</text>
  <text x="580" y="829" class="label">GND</text>

</svg>